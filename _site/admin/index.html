
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>conman</title>

  <link rel="stylesheet" href="/css/3f/fff.css">

  
    
</head>

<body>
<main class="page" style="">
        <div id="doc-marginalia" class="marginalia marginalia--document"></div>
            
            <div class="marginalia marginalia--fixed">
                
                
                
                
            </div>

            <main class="page__content ">

            

            <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<style>

:root{ 

    --bg: #E54501;
    --fg: #143B27;
}

  .admin-login {
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: var(--bg);
    color: var(--fg);
  }

  .admin-login__button {
    appearance: none;
    border: 2px solid var(--fg);
    background: var(--fg);
    color: var(--bg);
    padding: 1rem 1.5rem;
    font-family: var(--font-display);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    cursor: pointer;
    border-radius: 0;
    transition: all 200ms var(--easing)
  }

  .admin-login__button:hover {
    background: var(--bg);
    color: var(--fg);
    letter-spacing: 0.5em;
  }

  .admin-login__note {
    margin-top: 1rem;
    font-family: monospace;
    font-size: 0.8rem;
    opacity: 0.7;
    text-align: center;
  }
</style>

<div class="admin-login">
  <div>
    <button id="admin-login-button" class="admin-login__button __set__huge" type="button">
      login
    </button>

  </div>
</div>

<script>
  const button = document.getElementById("admin-login-button");

  button.addEventListener("click", () => {
    if (window.netlifyIdentity) {
      window.netlifyIdentity.open("login");
    }
  });

  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("login", () => {
      window.location.href = "/admin/cms/";
    });
  }
</script>


            </main>
    </div>

      <script>
        (() => {
          const root = document.getElementById("doc-marginalia");
          if (!root) return;

          function addCrosshair(panel, x, y, { minor = false, dx = "0px", dy = "0px" } = {}) {
            const el = document.createElement("div");
            el.className = minor ? "crosshair crosshair--minor" : "crosshair";

            el.style.setProperty("--x", `${x}%`);
            el.style.setProperty("--y", `${y}%`);
            el.style.setProperty("--dx", dx);
            el.style.setProperty("--dy", dy);

            panel.appendChild(el);
          }

          function buildPanels() {
            root.innerHTML = "";

            const pageHeight = Math.max(
              document.body.scrollHeight,
              document.documentElement.scrollHeight,
              document.body.offsetHeight,
              document.documentElement.offsetHeight
            );

            const vh = window.innerHeight;
            const count = Math.ceil(pageHeight / vh);

            root.style.height = `${pageHeight}px`;

            for (let i = 0; i < count; i++) {
              const panel = document.createElement("div");
              panel.className = "marginalia_panel";
              panel.style.top = `${i * vh}px`;
              panel.style.height = `${vh}px`;

              /* --- MAJOR CROSSHAIRS (existing 3x3 grid) --- */
              const major = [
                [0, 0],
                [50, 0],
                [100, 0],
                [0, 50],
                [50, 50],
                [100, 50],
                [0, 100],
                [50, 100],
                [100, 100],
              ];

              for (const [x, y] of major) {
                addCrosshair(panel, x, y);
              }

              /* --- MINOR CROSSHAIRS (in-between positions) --- */
              const minor = [
                [25, 0], [75, 0],
                [0, 25], [0, 75],
                [100, 25], [100, 75],
                [25, 100], [75, 100],
                [25, 25], [75, 25],
                [25, 75], [75, 75],
              ];

              for (const [x, y] of minor) {
                addCrosshair(panel, x, y, { minor: true });
              }

              /* --- OPTIONAL: offset corner crosshairs outward --- */
              addCrosshair(panel, 0, 0);
              addCrosshair(panel, 100, 0);
              addCrosshair(panel, 0, 100);
              addCrosshair(panel, 100, 100 );

              root.appendChild(panel);
            }
          }

          buildPanels();
          window.addEventListener("resize", buildPanels);
          window.addEventListener("load", buildPanels);
        })();
      </script>

  
  </main>
</body>
</html>
