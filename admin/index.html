<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<style>

:root{ 

    --bg: #E54501;
    --fg: #143B27;
}

  .admin-login {
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: var(--bg);
    color: var(--fg);
  }

  .admin-login__button {
    appearance: none;
    border: 2px solid var(--fg);
    background: var(--fg);
    color: var(--bg);
    padding: 1rem 1.5rem;
    font-family: var(--font-display);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    cursor: pointer;
    border-radius: 0;
    transition: all 200ms var(--easing)
  }

  .admin-login__button:hover {
    background: var(--bg);
    color: var(--fg);
    letter-spacing: 0.5em;
  }

  .admin-login__note {
    margin-top: 1rem;
    font-family: monospace;
    font-size: 0.8rem;
    opacity: 0.7;
    text-align: center;
  }
</style>

<div class="admin-login">
  <div>
    <button id="admin-login-button" class="admin-login__button __set__huge" type="button">
      login
    </button>

  </div>
</div>

<script>
  const button = document.getElementById("admin-login-button");

  button.addEventListener("click", () => {
    if (window.netlifyIdentity) {
      window.netlifyIdentity.open("login");
    }
  });

  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("login", () => {
      window.location.href = "/admin/cms/";
    });
  }
</script>
