---
layout: default
title: one

header: false
footer: false
---

<div class="stack">

{% for photo in site.pixels %}

    <a href="{{ photo.url | relative_url }}">
      <div class="frame font__meta">
          <div class="frame__margin">
            <div class="frame__body">
                <div class="frame__media">
                    <img
                      src="{{ post.image | relative_url }}"
                      alt="{{ post.title | escape }}"
                      loading="lazy">
                </div>
            </div>
        </div>
      </div>
    </a>
{% endfor %}
{% for essay in site.text %}
    <a href="{{ essay.url | relative_url }}">
        <div class="frame">
              <div class="crosshair crosshair--tr"></div>

            <div class="frame__margin">
                <div class="frame__body">
                    <div class="frame__text">
                      <h1>{{ essay.title }}</h1>
                      <p class="type__mark">{{ essay.content}}</p>
                    </div>
                </div>
            </div>
        </div>
    </a>
{% endfor %}
</div>
</div>
