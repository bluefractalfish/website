---
layout: default
title: one

content_type: words
---


<div class="stack">
    <a href="{{site.url | relative_url}}" class="button">back</a>
{% if page.content_type == "pixels" %}
{% for photo in site.pixels %}

    <a href="{{ photo.url | relative_url }}">
      <div class="frame font__display">
          <div class="frame__margin">
            <div class="frame__body">
                <div class="frame__media">
                    <img
                      src="{{ photo.image | relative_url }}"
                      alt="{{ photo.title | escape }}"
                      loading="lazy">
                </div>
            </div>
        </div>
      </div>
    </a>
{% endfor %}
{%endif%}

{% if page.content_type == "words" %}
{% for essay in site.text %}
    <a href="{{ essay.url | relative_url }}">
        <div class="frame">
              <div class="crosshair crosshair--tr"></div>

            <div class="frame__margin">
                <div class="frame__body">
                    <div class="frame__text">
                      <h1 class="type__title">{{ essay.title }}</h1>
                      <p class="type__title">{{ essay.excerpt }}</p>
                    </div>
                </div>
            </div>
        </div>
    </a>
{% endfor %}
{%endif%}

</div>
