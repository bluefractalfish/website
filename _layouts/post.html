---
layout: default
---

<div class="page">
    
    {% if page.image %}
      <a href="{{ page.image | relative_url }}" target="_blank">
        <img class = " box box-photo" src="{{ page.image | relative_url }}"
             alt="{{ page.title | escape }}"
             loading="lazy">
      </a>
    {% endif %}

    {% assign body = content | strip_html | strip %}
    {% if body != "" %}
      <div class="box-text content">
        <h1>{{ page.title }}</h1>
        {{ content }}
      </div>
    {% endif %}
</div>
