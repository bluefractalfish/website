<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ page.title | default: site.title }}</title>

  <link rel="stylesheet" href="{{ '/css/font.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
</head>
<body>
  <header class="head">
    <div class="head-font" id="head">fractal.fish</div>

    {% if site.cursor_readout.enabled %}
    <div class="cursor-readout" data-mode="{{ site.cursor_readout.mode }}" aria-hidden="true">
      <span class="cursor-field">
        {{ site.cursor_readout.label_x}}
        <span id="cursorX">{{ site.cursor_readout.default_x}}</span>
      </span>
      <span class="cursor-field">
        {{ site.cursor_readout.label_y}}
        <span id="cursorY">{{ site.cursor_readout.default_y}}</span>
      </span>
    </div>
    {% endif %}
  </header>

  <div class="page">
    {{ content }}
    <div class="foot">
      <div class="foot-font">
        <a href="https://qu.in.net" target="_blank"><l>/qu.in.net</l></a>
        <a href="https://github.com/bluefractalfish" target="_blank"><l>/bluefractalfish</l></a>
      </div>
    </div>
  </div>

  <script src="{{ '/scripts/scripts.js' | relative_url }}"></script>
</body>
</html>
