<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ page.title | default: site.title }}</title>

  <link rel="stylesheet" href="{{ '/css/font.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
  <script src="{{ '/scripts/scripts.js' | relative_url }}" defer></script>
</head>

<body>
  <header class="head">
    <div class="head-row">
      <span class="cursor-field ">
        <span id="cursorY">0000</span>
      <span></span>
        <span id="cursorX">0000</span>
    </div>
  </header>

  <div class="page">
    {{ content }}

    <div class="foot">
      <div class="foot-font">
        <a class="link" href="{{ '/' | relative_url }}">&lt;&gt;&lt;</a>
      </div>
    </div>
  </div>
</body>
</html>
