<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ page.title | default: site.title }}</title>

  <!-- VARIABLE FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Roboto Flex -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght,wdth,slnt@8..144,100..1000,25..151,-10..0&display=swap" rel="stylesheet">
  <!-- Recursive -->
  <link href="https://fonts.googleapis.com/css2?family=Recursive:wght,slnt,CASL,CRSV,MONO@300..1000,-15..0,0..1,0..1,0..1&display=swap" rel="stylesheet">
  <!-- Fraunces -->
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,100..900,0..100,0..1&display=swap" rel="stylesheet">

  <!-- Splitting.js -->
  <link rel="stylesheet" href="https://unpkg.com/splitting/dist/splitting.css">
  <script src="https://unpkg.com/splitting/dist/splitting.min.js"></script>
  <link rel="stylesheet" href="{{ '/css/font.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
  <script src="{{ '/scripts/scripts.js' | relative_url }}" defer></script>
  <!-- p5.js -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
  {% if page.p5_sound %}
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/addons/p5.sound.min.js"></script>
  {% endif %}

  {%- comment -%}
      Load the sketch file for this page.
      Usage: p5_sketch: /assets/sketches/mySketch.js
  {%- endcomment -%}
  {% if page.p5_sketch %}
      <script src="{{ page.p5_sketch | relative_url }}" defer></script>
  {% endif %}
  <!--<script src="{{ '/assets/js/layout-guides.js' | relative_url}}" defer></script>-->
</head>

<body>
  <header class="head">
    <div class="head-row">
      <span class="cursor-field cursor-left"><span id="cursorY">0000</span></span>
      <span></span>
      <span class="cursor-field cursor-right"><span id="cursorX">0000</span></span>
    </div>
  </header>

  <main class="page">
    <div style="height: 5vh;"></div>
    {% if page.p5 %}
      <div id="p5-container" class="p5-container"></div>
    {% endif %}
    {{ content }}
  </main>

  <footer class="foot">
    <div class="foot-row"> 
      <span class="footer-field footer-left">f.f</span>
      <span></span>
      <span class="footer-field footer-right">{{page.title}}</span>
    </div>
  </footer>
</body>
</html>
